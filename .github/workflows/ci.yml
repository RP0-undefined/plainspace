name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Unit tests (stdlib only)
        run: python3 tools/test_psindex.py
      - name: Conformance check on examples
        run: |
          python3 tools/psindex.py check examples/sample-workspace
          python3 tools/psindex.py check examples/memory-workspace
